<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Signals Dashboard</title>

  <!-- Tabulator CSS -->
  <link href="https://unpkg.com/tabulator-tables@5.5.2/dist/css/tabulator.min.css" rel="stylesheet">

  <!-- SQL.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>

  <!-- Tabulator JS -->
  <script src="https://unpkg.com/tabulator-tables@5.5.2/dist/js/tabulator.min.js"></script>

  <!-- Your CSS -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- 🔝 Compact Header -->
  <div class="top-bar">
    <h1>📈 Stock Signals</h1>
    <button id="downloadCSV" class="export-btn">Export CSV</button>
  </div>

  <!-- Last Updated -->
  <p id="lastUpdated" class="last-updated"></p>

  <!-- Filters (Dynamic) -->
  <div id="filters"></div>

  <!-- 🔥 Quick Filters -->
  <div id="quickFilters" class="quick-filters">
    <button data-filter="strong">Strong</button>
    <button data-filter="momentum">Momentum</button>
    <button data-filter="lowrisk">Low Risk</button>
    <button data-filter="reset" class="active">Reset</button>
  </div>

  <!-- 📊 Table -->
  <div id="tableContainer">
    <div id="table"></div>
  </div>

  <!-- Scripts -->
  <script src="queries.js"></script>
  <script src="script.js"></script>

</body>
</html>
