<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Signals Dashboard</title>

  <!-- Tabulator CSS -->
  <link href="https://unpkg.com/tabulator-tables@5.5.2/dist/css/tabulator.min.css" rel="stylesheet">

  <!-- SQL.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>

  <!-- Tabulator JS -->
  <script src="https://unpkg.com/tabulator-tables@5.5.2/dist/js/tabulator.min.js"></script>

  <!-- Your CSS -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- Title -->
  <h1>📈 Stock Signals Dashboard</h1>

  <!-- Subtitle -->
  <p class="subtitle">
    Track signal performance, risk, and momentum across stocks
  </p>

  <!-- Last Updated -->
  <p id="lastUpdated" class="last-updated"></p>

  <!-- Controls -->
  <div id="controls">
    <button id="downloadCSV">Export CSV</button>
  </div>

  <!-- Dynamic Filters -->
  <div id="filters"></div>

  <!-- 🔥 Quick Filters -->
  <div id="quickFilters" class="quick-filters">
    <button data-filter="strong">Strong Signals</button>
    <button data-filter="momentum">Momentum</button>
    <button data-filter="lowrisk">Low Risk</button>
    <button data-filter="reset" class="active">Reset</button>
  </div>

  <!-- Table -->
  <div id="tableContainer">
    <div id="table"></div>
  </div>

  <!-- Scripts -->
  <script src="queries.js"></script>
  <script src="script.js"></script>

</body>
</html>
